<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proximity Voice Chat</title>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c28;
    --border: rgba(255,255,255,0.08);
    --accent: #4fffb0;
    --accent2: #6c63ff;
    --danger: #ff4f6b;
    --warn: #ffb84f;
    --text: #f0f0f8;
    --muted: #6b6b88;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; }
  body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

  header {
    padding: 0.75rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 10px; flex-shrink: 0;
  }
  .logo { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
  .logo span { color: var(--accent); }
  .logo small { font-size: 12px; color: var(--muted); font-weight: 400; margin-left: 6px; }
  .header-right { display: flex; align-items: center; gap: 10px; }

  .status-pill {
    font-family: 'Space Mono', monospace; font-size: 11px;
    padding: 4px 12px; border-radius: 999px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--muted); display: flex; align-items: center; gap: 6px;
  }
  .status-pill .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
  .status-pill.connected { color: var(--accent); border-color: rgba(79,255,176,0.3); }
  .status-pill.connected .dot { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .status-pill.error { color: var(--danger); border-color: rgba(255,79,107,0.3); }
  .status-pill.error .dot { background: var(--danger); }
  .status-pill.warn { color: var(--warn); border-color: rgba(255,184,79,0.3); }
  .status-pill.warn .dot { background: var(--warn); }

  main {
    flex: 1; display: grid; grid-template-columns: 300px 1fr;
    overflow: hidden; min-height: 0;
  }

  aside {
    border-right: 1px solid var(--border); background: var(--surface);
    display: flex; flex-direction: column; overflow-y: auto; min-height: 0;
  }

  .panel { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); }
  .panel-title {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 1.5px; color: var(--muted); margin-bottom: 10px;
  }

  .info-box {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 14px;
    font-family: 'Space Mono', monospace; font-size: 11px;
    display: flex; flex-direction: column; gap: 5px;
  }
  .info-box .ib-row { display: flex; justify-content: space-between; gap: 8px; }
  .info-box .ib-key { color: var(--muted); }
  .info-box .ib-val { color: var(--text); text-align: right; }
  .info-box .ib-name { color: var(--accent); font-size: 13px; font-weight: 700; }

  .btn {
    padding: 8px 16px; border-radius: var(--radius); border: none;
    font-size: 13px; font-family: 'Syne', sans-serif; font-weight: 600;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .btn-accent { background: var(--accent); color: #0a0a0f; }
  .btn-accent:hover { background: #6fffc3; }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--surface); border-color: rgba(255,255,255,0.2); }
  .btn-sm { padding: 4px 10px; font-size: 11px; border-radius: 6px; font-family: 'Space Mono',monospace; }

  /* Player list */
  .player-list { display: flex; flex-direction: column; gap: 8px; }
  .player-card {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 12px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 8px; transition: border 0.2s, opacity 0.2s;
  }
  .player-card.hearing { border-color: rgba(79,255,176,0.45); }
  .player-card.offline  { opacity: 0.45; }
  .player-card .p-info { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
  .avatar {
    width: 34px; height: 34px; border-radius: 8px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 12px; font-family: 'Space Mono', monospace;
  }
  .p-name { font-size: 13px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .p-dist { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }
  .vol-mini { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .vol-mini-bar { width: 46px; height: 4px; background: var(--surface); border-radius: 2px; overflow: hidden; }
  .vol-mini-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.2s; }
  .vol-pct-sm { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); min-width: 26px; text-align: right; }

  /* Mic button */
  .mic-section { padding: 1rem 1.25rem; margin-top: auto; border-top: 1px solid var(--border); }
  .mic-big {
    width: 100%; padding: 13px; border-radius: var(--radius);
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); font-family: 'Syne', sans-serif; font-size: 14px;
    font-weight: 600; cursor: pointer; display: flex; align-items: center;
    justify-content: center; gap: 8px; transition: all 0.15s;
  }
  .mic-big:hover { background: var(--surface); }
  .mic-big.active {
    background: rgba(79,255,176,0.12); border-color: rgba(79,255,176,0.5);
    color: var(--accent); animation: pulse-border 1.5s infinite;
  }
  @keyframes pulse-border {
    0%,100% { box-shadow: 0 0 0 0 rgba(79,255,176,0.3); }
    50%      { box-shadow: 0 0 0 6px rgba(79,255,176,0); }
  }
  .mic-status { margin-top: 6px; text-align: center; font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; }

  /* MAP */
  #map-area { position: relative; overflow: hidden; background: var(--bg); }
  #map-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

  .map-overlay-tr {
    position: absolute; top: 14px; right: 14px; z-index: 20;
    display: flex; flex-direction: column; gap: 8px;
  }
  .map-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 14px;
    font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted);
    min-width: 160px;
  }
  .map-card label { display: block; margin-bottom: 4px; }
  .map-card input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }

  .log-box {
    position: absolute; bottom: 36px; left: 14px;
    background: rgba(13,13,20,0.9); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 8px 12px;
    font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted);
    max-width: 300px; max-height: 110px; overflow-y: auto; z-index: 20;
  }
  .log-line  { margin-bottom: 2px; }
  .log-ok    { color: var(--accent); }
  .log-err   { color: var(--danger); }
  .log-info  { color: #6c63ff; }
  .log-warn  { color: var(--warn); }

  .map-hint {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace;
    background: rgba(10,10,15,0.7); padding: 4px 14px; border-radius: 99px;
    border: 1px solid var(--border); pointer-events: none; white-space: nowrap;
  }

  /* Name modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.85); z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 2rem; max-width: 400px; width: 90%; text-align: center;
  }
  .modal h3 { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
  .modal p  { font-size: 13px; color: var(--muted); margin-bottom: 1.2rem; line-height: 1.6; }
  .modal input {
    width: 100%; margin-bottom: 1rem; text-align: center;
    font-size: 15px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 14px; color: var(--text);
    font-family: 'Space Mono', monospace; outline: none;
  }
  .modal input:focus { border-color: rgba(79,255,176,0.4); }
  .modal-btns { display: flex; gap: 10px; justify-content: center; }

  @media (max-width: 700px) {
    main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    aside { max-height: 45vh; }
    #map-area { min-height: 300px; }
  }
</style>
</head>
<body>

<!-- Enter Minecraft name modal -->
<div class="modal-overlay show" id="name-modal">
  <div class="modal">
    <h3>🎮 ใส่ชื่อ Minecraft</h3>
    <p>ใส่ชื่อตัวละครในเกมให้ตรงกัน<br>ระบบจะจับตำแหน่งและเสียงให้อัตโนมัติ</p>
    <input type="text" id="name-input" placeholder="Steve, Alex, ..." maxlength="32" autocomplete="off" />
    <div class="modal-btns">
      <button class="btn btn-accent" onclick="submitName()">เข้าสู่ห้อง</button>
    </div>
  </div>
</div>

<header>
  <div class="logo">Proximity<span>Voice</span><small>× Minecraft</small></div>
  <div class="header-right">
    <div class="status-pill" id="mc-pill">
      <div class="dot"></div>
      <span id="mc-text">รอ Minecraft...</span>
    </div>
    <div class="status-pill" id="voice-pill">
      <div class="dot"></div>
      <span id="voice-text">กำลังเชื่อมต่อ...</span>
    </div>
  </div>
</header>

<main>
  <aside>
    <!-- My info -->
    <div class="panel">
      <div class="panel-title">ตัวฉัน</div>
      <div class="info-box">
        <div class="ib-row">
          <span class="ib-key">ชื่อ</span>
          <span class="ib-val ib-name" id="my-name-label">—</span>
        </div>
        <div class="ib-row">
          <span class="ib-key">พิกัด</span>
          <span class="ib-val" id="my-coord-text">รอข้อมูล...</span>
        </div>
        <div class="ib-row">
          <span class="ib-key">มิติ</span>
          <span class="ib-val" id="my-dim-text">—</span>
        </div>
        <div class="ib-row">
          <span class="ib-key">วงไมค์</span>
          <span class="ib-val" id="range-display">10 blocks</span>
        </div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="changeName()" style="margin-top:8px;width:100%">เปลี่ยนชื่อ</button>
    </div>

    <!-- Player list -->
    <div class="panel" style="flex:1;min-height:0;overflow-y:auto;">
      <div class="panel-title">ผู้เล่นในเซิร์ฟ <span id="player-count" style="color:var(--accent)"></span></div>
      <div class="player-list" id="player-list">
        <div style="font-size:12px;color:var(--muted);font-family:'Space Mono',monospace;">
          รอข้อมูลจาก Minecraft...
        </div>
      </div>
    </div>

    <!-- Mic -->
    <div class="mic-section">
      <button class="mic-big" id="mic-btn" onclick="toggleMic()">
        <span id="mic-icon">🎙</span>
        <span id="mic-label">เปิดไมค์</span>
      </button>
      <div class="mic-status" id="mic-status">ไมค์ปิดอยู่</div>
    </div>
  </aside>

  <!-- Map: top-down XZ view -->
  <div id="map-area">
    <canvas id="map-canvas"></canvas>

    <div class="map-overlay-tr">
      <div class="map-card">
        <label>ระยะวงไมค์: <strong style="color:var(--accent)" id="range-label">10</strong> blocks</label>
        <input type="range" min="3" max="50" value="10" id="range-slider" oninput="updateRange(this.value)">
      </div>
    </div>

    <div class="log-box" id="log-box"></div>
    <div class="map-hint">แผนที่ตำแหน่งจาก Minecraft (XZ)</div>
  </div>
</main>

<script>
// =============================================
//  CONFIG
// =============================================
const MC_ENDPOINT = '/minecraft-data';   // GET endpoint ที่ server เก็บข้อมูลล่าสุดจาก BP addon
const MC_POLL_MS  = 1000;               // polling ทุก 1 วินาที
const PX_PER_BLOCK = 10;               // pixels ต่อ 1 block บน canvas

const COLORS = [
  { bg:'#1a2a4a', text:'#7eb8f7', border:'#4a90d9' },
  { bg:'#1a3a2a', text:'#7effc3', border:'#4fff9c' },
  { bg:'#3a1a2a', text:'#ff9cc8', border:'#ff4f9c' },
  { bg:'#2a2a1a', text:'#ffe07e', border:'#ffc84a' },
  { bg:'#2a1a3a', text:'#b09cff', border:'#7c63ff' },
  { bg:'#3a2a1a', text:'#ffb07e', border:'#ff8c4a' },
];

// =============================================
//  STATE
// =============================================
let myName        = null;
let myColorIdx    = 0;
let peer          = null;
let myPeerId      = null;
let localStream   = null;
let micOn         = false;
let audioCtxShared = null;
let hearDist      = 10;       // หน่วย blocks

// mcPlayers: { playerName -> { name, location:{x,y,z,dimension}, data:{isMuted,micVolume} } }
let mcPlayers = {};
let mcLastOk  = 0;

// peers: { playerName -> { conn, call, gainNode, audio, colorIdx, connReady } }
const peers = {};

// retry cooldown: { playerName -> { nextTry: timestamp, attempts: number } }
const retryCooldown = {};

let mapW = 0, mapH = 0;
let camX = 0, camZ = 0;      // world coords ตรงกลาง canvas

// =============================================
//  NAME MODAL
// =============================================
function submitName() {
  const val = document.getElementById('name-input').value.trim();
  if (!val) { document.getElementById('name-input').focus(); return; }
  myName = val;
  myColorIdx = Math.floor(Math.random() * COLORS.length);
  document.getElementById('name-modal').classList.remove('show');
  document.getElementById('my-name-label').textContent = myName;
  log('ยินดีต้อนรับ ' + myName, 'ok');
  initPeer();
  startMCPolling();
}

function changeName() {
  document.getElementById('name-input').value = myName || '';
  document.getElementById('name-modal').classList.add('show');
  setTimeout(() => document.getElementById('name-input').focus(), 100);
}

document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitName();
});

// =============================================
//  MINECRAFT DATA POLLING
//  BP Addon ส่ง POST /minecraft-data → server เก็บ → web ดึง GET
// =============================================
function startMCPolling() {
  fetchMCData();
  setInterval(fetchMCData, MC_POLL_MS);
}

async function fetchMCData() {
  try {
    const res = await fetch(MC_ENDPOINT);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    mcLastOk = Date.now();
    onMCData(data);
  } catch(e) {
    if (Date.now() - mcLastOk > 5000 && mcLastOk > 0) {
      setMCStatus('warn', 'ไม่ได้รับข้อมูล MC');
    }
  }
}

function onMCData(data) {
  // data = { players: [...], config: { maxDistance } }
  const newPlayers = {};
  (data.players || []).forEach(p => { newPlayers[p.name] = p; });
  mcPlayers = newPlayers;

  // ถ้า server ส่ง maxDistance มาด้วย → ใช้ค่านั้น
  if (data.config?.maxDistance) {
    hearDist = data.config.maxDistance;
    document.getElementById('range-label').textContent = hearDist;
    document.getElementById('range-slider').value = hearDist;
    document.getElementById('range-display').textContent = hearDist + ' blocks';
  }

  // อัปเดตข้อมูลตัวเอง
  const me = mcPlayers[myName];
  if (me) {
    const l = me.location;
    document.getElementById('my-coord-text').textContent = `${l.x}, ${l.y}, ${l.z}`;
    document.getElementById('my-dim-text').textContent    = l.dimension || 'overworld';
    camX = l.x; camZ = l.z;
    setMCStatus('connected', 'Minecraft เชื่อมอยู่');
  } else if (myName) {
    setMCStatus('warn', `ไม่พบ "${myName}" ในเกม`);
  }

  const total = Object.keys(mcPlayers).length;
  document.getElementById('player-count').textContent = total > 0 ? `(${total})` : '';

  syncVoiceConnections();
  updatePlayerList();
  renderMap();
}

// =============================================
//  3D BLOCK DISTANCE  (ข้ามมิติ = ∞)
// =============================================
function getBlockDist(a, b) {
  const pa = mcPlayers[a], pb = mcPlayers[b];
  if (!pa || !pb) return 99999;
  if ((pa.location.dimension||'overworld') !== (pb.location.dimension||'overworld')) return 99999;
  const dx = pa.location.x - pb.location.x;
  const dy = pa.location.y - pb.location.y;
  const dz = pa.location.z - pb.location.z;
  return Math.sqrt(dx*dx + dy*dy + dz*dz);
}

function getVolume(name) {
  if (!myName) return 0;
  const pp = peers[name];
  const mc = mcPlayers[name];
  if (mc?.data?.isMuted) return 0;
  const d = getBlockDist(myName, name);
  if (d >= hearDist) return 0;
  const vol = Math.max(0, 1 - d / hearDist);    // linear falloff
  const mv  = mc?.data?.micVolume ?? 1;          // ปรับ mic volume ผู้พูด
  return vol * mv;
}

// =============================================
//  AUDIO CONTEXT
// =============================================
function getAudioCtx() {
  if (!audioCtxShared) audioCtxShared = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtxShared.state === 'suspended') audioCtxShared.resume();
  return audioCtxShared;
}

function createSilenceStream() {
  try { return getAudioCtx().createMediaStreamDestination().stream; } catch(e) { return null; }
}

// =============================================
//  PEER SLOT
// =============================================
function ensurePeer(name) {
  if (!peers[name]) {
    peers[name] = {
      conn: null, call: null, gainNode: null, audio: null,
      colorIdx: Object.keys(peers).length % COLORS.length,
      connReady: false,
    };
  }
  return peers[name];
}

function cleanupPeer(name) {
  const pp = peers[name];
  if (!pp) return;
  try { if (pp.audio) pp.audio.srcObject = null; } catch(e){}
  try { if (pp.gainNode) pp.gainNode.disconnect(); } catch(e){}
  try { if (pp.call) pp.call.close(); } catch(e){}
  delete peers[name];
}

// =============================================
//  PEERJS  —  ID = "pv-" + ชื่อ Minecraft
// =============================================
function nameToPeerId(name) {
  return 'pv-' + name.toLowerCase().replace(/[^a-z0-9]/g, '_');
}

function initPeer() {
  if (!myName) return;
  const pid = nameToPeerId(myName);
  peer = new Peer(pid, { debug: 0 });

  peer.on('open', id => {
    myPeerId = id;
    setVoiceStatus('connected', 'Voice พร้อม · ' + myName);
    log('PeerJS: ' + id, 'ok');
  });

  peer.on('connection', conn => {
    const name = peerIdToName(conn.peer);
    log('data ← ' + name, 'info');
    setupDataConn(conn, name);
  });

  peer.on('call', call => {
    const name = peerIdToName(call.peer);
    log('รับสาย ← ' + name, 'info');
    call.answer(localStream || createSilenceStream());
    handleIncomingCall(call, name);
  });

  peer.on('disconnected', () => {
    setVoiceStatus('warn', 'กำลัง reconnect...');
    log('PeerJS หลุด กำลัง reconnect...', 'warn');
    setTimeout(() => { try { peer.reconnect(); } catch(e){} }, 2000);
  });

  peer.on('error', e => {
    if (e.type === 'unavailable-id') {
      log('ชื่อนี้ถูกใช้ใน Voice แล้ว', 'warn');
      setVoiceStatus('warn', 'ชื่อซ้ำในระบบ voice');
      return;
    }
    if (e.type === 'peer-unavailable') {
      // อีกคนยังไม่ได้เปิดเว็บ — รอ retry อัตโนมัติ อย่าแสดง error แดง
      const pid  = String(e.message || '').match(/Could not connect to peer ([\w-]+)/)?.[1] || '';
      const name = pid ? peerIdToName(pid) : '?';
      const cd   = retryCooldown[name];
      const sec  = cd ? Math.round((cd.nextTry - Date.now()) / 1000) : '?';
      log(`รอ ${name} เปิดเว็บ… retry ใน ${sec}s`, 'warn');
      return;
    }
    log('Peer error: ' + e.type, 'err');
    setVoiceStatus('error', 'ผิดพลาด: ' + e.type);
  });
}

function peerIdToName(pid) {
  // ค้นหาจาก peers ก่อน
  for (const [n] of Object.entries(peers)) {
    if (nameToPeerId(n) === pid) return n;
  }
  // ค้นหาจาก mcPlayers
  for (const n of Object.keys(mcPlayers)) {
    if (nameToPeerId(n) === pid) return n;
  }
  return pid.replace(/^pv-/, '');
}

// =============================================
//  SYNC VOICE — เชื่อม/ปรับเสียงตามระยะ block
// =============================================
function syncVoiceConnections() {
  if (!myName || !peer) return;

  Object.keys(mcPlayers).forEach(name => {
    if (name === myName) return;
    const dist = getBlockDist(myName, name);
    if (dist < hearDist * 2) {
      const pp = ensurePeer(name);
      // ตรวจ cooldown ก่อน connect ใหม่
      const cd = retryCooldown[name];
      const now = Date.now();
      if (!pp.connReady && (!cd || now >= cd.nextTry)) {
        doConnect(name);
      }
      if (micOn && pp.connReady && (!pp.call || !pp.call.open)) callPeer(name);
    }
  });

  updateAudio();
}

// =============================================
//  DATA CONNECTION
// =============================================
function doConnect(name) {
  if (!peer || name === myName) return;
  if (peers[name]?.connReady) return;
  const pid = nameToPeerId(name);
  log('เชื่อม → ' + name, 'info');

  // ตั้ง cooldown ป้องกัน spam (จะล้างถ้าสำเร็จ)
  const cd = retryCooldown[name] || { attempts: 0, nextTry: 0 };
  cd.attempts++;
  // backoff: 3s, 6s, 12s, 24s, max 30s
  const delay = Math.min(3000 * Math.pow(2, cd.attempts - 1), 30000);
  cd.nextTry = Date.now() + delay;
  retryCooldown[name] = cd;

  const conn = peer.connect(pid, { reliable: true, serialization: 'json' });
  setupDataConn(conn, name);
  conn.on('open', async () => {
    // สำเร็จ → ล้าง cooldown
    retryCooldown[name] = { attempts: 0, nextTry: 0 };
    if (micOn) await callPeer(name);
  });
  conn.on('error', e => {
    log('conn err ' + name + ': ' + e.type, 'err');
  });
}

function setupDataConn(conn, name) {
  const pp = ensurePeer(name);
  if (pp.conn && pp.conn !== conn) { try { pp.conn.close(); } catch(e){} }
  pp.conn = conn;

  conn.on('open', () => {
    pp.connReady = true;
    log('data เปิด: ' + name, 'ok');
    updatePlayerList();
  });

  conn.on('close', () => {
    log(name + ' ออก', 'err');
    retryCooldown[name] = { attempts: 0, nextTry: 0 }; // reset ให้ retry ใหม่ได้เลย
    cleanupPeer(name);
    updatePlayerList(); renderMap();
  });

  conn.on('error', e => log('conn err ' + name + ': ' + e, 'err'));
}

// =============================================
//  VOICE
// =============================================
async function getMic() {
  if (localStream) return localStream;
  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
      video: false,
    });
    return localStream;
  } catch(e) {
    log('ไม่สามารถเข้าถึงไมค์: ' + e.message, 'err');
    return null;
  }
}

async function callPeer(name) {
  if (!peer || !peers[name]) return;
  const pp = peers[name];
  if (pp.call && pp.call.open) return;
  const stream = await getMic();
  if (!stream) return;
  log('โทร → ' + name, 'info');
  const call = peer.call(nameToPeerId(name), stream);
  pp.call = call;
  handleIncomingCall(call, name);
}

function handleIncomingCall(call, name) {
  const pp = ensurePeer(name);
  if (pp.call && pp.call !== call) { try { pp.call.close(); } catch(e){} }
  pp.call = call;

  call.on('stream', remoteStream => {
    attachAudio(name, remoteStream);
    log('ได้ยิน ' + name, 'ok');
    updateAudio(); updatePlayerList(); renderMap();
  });

  call.on('close', () => {
    if (peers[name]?.audio) { try { peers[name].audio.srcObject = null; } catch(e){} }
  });

  call.on('error', e => log('call err ' + name + ': ' + e, 'err'));
}

function attachAudio(name, remoteStream) {
  const pp = peers[name];
  if (!pp) return;
  try {
    const ctx = getAudioCtx();
    if (pp.gainNode) { try { pp.gainNode.disconnect(); } catch(e){} }
    const src  = ctx.createMediaStreamSource(remoteStream);
    const gain = ctx.createGain();
    gain.gain.value = getVolume(name);
    src.connect(gain);
    gain.connect(ctx.destination);
    pp.gainNode = gain;
    // Safari keepalive
    if (!pp.audio) { pp.audio = new Audio(); pp.audio.muted = true; }
    pp.audio.srcObject = remoteStream;
    pp.audio.play().catch(() => {});
  } catch(e) {
    if (!pp.audio) { pp.audio = new Audio(); pp.audio.autoplay = true; }
    pp.audio.srcObject = remoteStream;
    pp.audio.volume = getVolume(name);
  }
}

function updateAudio() {
  Object.entries(peers).forEach(([name, pp]) => {
    const vol = getVolume(name);
    if (pp.gainNode) { try { pp.gainNode.gain.value = vol; } catch(e){} }
    else if (pp.audio) { pp.audio.volume = vol; }
  });
}

// =============================================
//  MIC TOGGLE
// =============================================
async function toggleMic() {
  getAudioCtx();
  micOn = !micOn;
  const btn    = document.getElementById('mic-btn');
  const icon   = document.getElementById('mic-icon');
  const label  = document.getElementById('mic-label');
  const status = document.getElementById('mic-status');

  if (micOn) {
    const stream = await getMic();
    if (!stream) { micOn = false; return; }
    btn.classList.add('active');
    icon.textContent   = '🔴';
    label.textContent  = 'ไมค์เปิดอยู่';
    status.textContent = 'กำลังส่งเสียง...';
    log('เปิดไมค์', 'ok');
    stream.getAudioTracks().forEach(t => t.enabled = true);
    for (const name of Object.keys(peers)) await callPeer(name);
  } else {
    btn.classList.remove('active');
    icon.textContent   = '🎙';
    label.textContent  = 'เปิดไมค์';
    status.textContent = 'ไมค์ปิดอยู่';
    if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = false);
    log('ปิดไมค์', 'info');
  }
}

// =============================================
//  RANGE SLIDER
// =============================================
function updateRange(val) {
  hearDist = +val;
  document.getElementById('range-label').textContent  = val;
  document.getElementById('range-display').textContent = val + ' blocks';
  updateAudio(); updatePlayerList(); renderMap();
}

// =============================================
//  PLAYER LIST UI
// =============================================
function updatePlayerList() {
  const list = document.getElementById('player-list');
  const allNames = new Set([...Object.keys(mcPlayers), ...Object.keys(peers)]);
  allNames.delete(myName);

  if (allNames.size === 0) {
    list.innerHTML = '<div style="font-size:12px;color:var(--muted);font-family:\'Space Mono\',monospace;">ยังไม่มีผู้เล่นอื่น</div>';
    return;
  }

  list.innerHTML = [...allNames].map((name, i) => {
    const mc     = mcPlayers[name];
    const pp     = peers[name];
    const vol    = Math.round(getVolume(name) * 100);
    const dist   = mc ? getBlockDist(myName, name) : null;
    const distTx = dist === null
      ? '—'
      : dist >= 99000 ? '⛏ ต่างมิติ'
      : dist.toFixed(1) + ' blocks';
    const c       = COLORS[(pp?.colorIdx ?? i) % COLORS.length];
    const isMuted = mc?.data?.isMuted;
    const online  = !!mc;
    const voiceOk = pp?.connReady;

    return `
      <div class="player-card ${vol > 0 ? 'hearing' : ''} ${!online ? 'offline' : ''}">
        <div class="p-info">
          <div class="avatar" style="background:${c.bg};color:${c.text}">
            ${esc(name).slice(0,2).toUpperCase()}
          </div>
          <div style="min-width:0">
            <div class="p-name">${esc(name)} ${isMuted ? '🔇' : ''}</div>
            <div class="p-dist">
              ${online ? distTx : '<span style="color:var(--warn)">ออฟไลน์</span>'}
              ${voiceOk ? ' · 🔊' : ''}
            </div>
          </div>
        </div>
        <div class="vol-mini">
          <div class="vol-mini-bar"><div class="vol-mini-fill" style="width:${vol}%"></div></div>
          <div class="vol-pct-sm">${vol}%</div>
        </div>
      </div>`;
  }).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// =============================================
//  STATUS PILLS
// =============================================
function setVoiceStatus(cls, text) {
  const p = document.getElementById('voice-pill');
  p.className = 'status-pill ' + cls;
  document.getElementById('voice-text').textContent = text;
}

function setMCStatus(cls, text) {
  const p = document.getElementById('mc-pill');
  p.className = 'status-pill ' + cls;
  document.getElementById('mc-text').textContent = text;
}

function log(msg, type) {
  const box  = document.getElementById('log-box');
  const line = document.createElement('div');
  line.className = 'log-line log-' + (type || '');
  const now = new Date();
  const t = [now.getHours(), now.getMinutes(), now.getSeconds()].map(n => String(n).padStart(2,'0')).join(':');
  line.textContent = '[' + t + '] ' + msg;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
  if (box.children.length > 60) box.removeChild(box.firstChild);
}

// =============================================
//  MAP CANVAS  —  Top-down XZ
// =============================================
const canvas = document.getElementById('map-canvas');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  const area = document.getElementById('map-area');
  mapW = canvas.width  = area.offsetWidth;
  mapH = canvas.height = area.offsetHeight;
  renderMap();
}

// world coords → canvas px
function wc(wx, wz) {
  return [
    mapW / 2 + (wx - camX) * PX_PER_BLOCK,
    mapH / 2 + (wz - camZ) * PX_PER_BLOCK,
  ];
}

function renderMap() {
  if (!mapW || !mapH) return;
  ctx.clearRect(0, 0, mapW, mapH);

  // Grid (ทุก 8 blocks)
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  const gs = PX_PER_BLOCK * 8;
  const ox = ((mapW / 2) - camX * PX_PER_BLOCK) % gs;
  const oz = ((mapH / 2) - camZ * PX_PER_BLOCK) % gs;
  for (let x = ((ox % gs) + gs) % gs; x < mapW; x += gs) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,mapH); ctx.stroke(); }
  for (let z = ((oz % gs) + gs) % gs; z < mapH; z += gs) { ctx.beginPath(); ctx.moveTo(0,z); ctx.lineTo(mapW,z); ctx.stroke(); }

  const me = mcPlayers[myName];
  if (!me) {
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.font = '12px Space Mono,monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('รอตำแหน่งจาก Minecraft...', mapW/2, mapH/2);
    return;
  }

  const [mx, mz] = wc(me.location.x, me.location.z);
  const myDim = me.location.dimension || 'overworld';
  const ringPx = hearDist * PX_PER_BLOCK;

  // Mic range ring
  ctx.save();
  ctx.beginPath(); ctx.arc(mx, mz, ringPx, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(79,255,176,0.18)';
  ctx.setLineDash([5,8]); ctx.lineWidth = 1.5; ctx.stroke();
  ctx.setLineDash([]); ctx.restore();

  // Voice connection lines
  Object.entries(peers).forEach(([name, pp]) => {
    const pm = mcPlayers[name];
    if (!pm || (pm.location.dimension||'overworld') !== myDim) return;
    const vol = getVolume(name);
    if (vol <= 0) return;
    const [px, pz] = wc(pm.location.x, pm.location.z);
    const grad = ctx.createLinearGradient(mx, mz, px, pz);
    grad.addColorStop(0, `rgba(79,255,176,${vol * 0.7})`);
    grad.addColorStop(1, `rgba(108,99,255,${vol * 0.7})`);
    ctx.beginPath(); ctx.moveTo(mx, mz); ctx.lineTo(px, pz);
    ctx.strokeStyle = grad; ctx.lineWidth = 1.5 + vol * 2.5; ctx.stroke();
  });

  // Other players
  let ci = 0;
  Object.entries(mcPlayers).forEach(([name, pm]) => {
    if (name === myName) return;
    const pDim   = pm.location.dimension || 'overworld';
    const sameDim = pDim === myDim;
    const pp     = peers[name];
    const c      = COLORS[(pp?.colorIdx ?? ci) % COLORS.length];
    ci++;
    const [px, pz] = wc(pm.location.x, pm.location.z);
    const vol = getVolume(name);

    ctx.save();
    ctx.globalAlpha = sameDim ? 1 : 0.3;

    ctx.beginPath(); ctx.arc(px, pz, 18, 0, Math.PI * 2);
    ctx.fillStyle = c.bg; ctx.fill();
    ctx.strokeStyle = vol > 0 ? c.border : 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 2; ctx.stroke();

    // initials
    ctx.fillStyle = c.text; ctx.font = 'bold 11px Syne,sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(name.slice(0,2).toUpperCase(), px, pz);

    // ชื่อ
    ctx.fillStyle = 'rgba(255,255,255,0.75)'; ctx.font = '9px Space Mono,monospace';
    ctx.fillText(name.length > 12 ? name.slice(0,11)+'…' : name, px, pz + 28);

    // ระยะ
    const d3 = getBlockDist(myName, name);
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillText(sameDim ? d3.toFixed(0)+'b' : '⛏', px, pz + 38);

    ctx.restore();
  });

  // ME
  ctx.save();
  ctx.beginPath(); ctx.arc(mx, mz, 20, 0, Math.PI * 2);
  ctx.fillStyle = COLORS[myColorIdx].bg; ctx.fill();
  ctx.strokeStyle = micOn ? '#4fffb0' : COLORS[myColorIdx].border;
  ctx.lineWidth = micOn ? 3 : 2; ctx.stroke();
  if (micOn) {
    ctx.beginPath(); ctx.arc(mx, mz, 28, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(79,255,176,0.35)'; ctx.lineWidth = 2; ctx.stroke();
  }
  ctx.fillStyle = COLORS[myColorIdx].text; ctx.font = 'bold 12px Syne,sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('ME', mx, mz);
  ctx.fillStyle = 'rgba(79,255,176,0.85)'; ctx.font = '9px Space Mono,monospace';
  ctx.fillText(myName || '', mx, mz + 28);
  ctx.restore();
}

// =============================================
//  INIT
// =============================================
window.addEventListener('load', resizeCanvas);
window.addEventListener('resize', resizeCanvas);

// Periodic sync
setInterval(() => {
  syncVoiceConnections();
  updateAudio();
  updatePlayerList();
  renderMap();
}, 1000);
</script>
